<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mission Gully - Die verschwundene Flasche</title>
    <link rel="stylesheet" href="style.css">
    <script src="data/story.js" defer></script>
    <script src="script.js" defer></script>
  </head>
  <body>
    <section class="intro-screen" id="introScreen" aria-label="Einstieg">
      <img class="intro-image" src="images/einstieg-mission-gully.jpg" alt="Mission Gully: Wie gelangt Plastik ins Meer?">
      <div class="intro-actions">
        <button class="start-button" id="startGameButton" type="button">Mission starten</button>
      </div>
    </section>

    <div class="app-shell" id="appShell" hidden>
      <header class="app-header">
        <div class="brand">
          <p class="eyebrow">Umwelt-Mission</p>
          <h1>Mission Gully</h1>
          <p>Die verschwundene Flasche</p>
        </div>

        <nav class="top-actions" aria-label="Navigation">
          <button class="nav-button" id="backButton" type="button">⬅ Zurück</button>
          <button class="nav-button" id="homeButton" type="button">🏠 Anfang</button>
        </nav>
      </header>

      <main class="scene-card" id="sceneCard" aria-live="polite" tabindex="-1">
        <section class="image-area" aria-labelledby="sceneTitle">
          <div class="scene-heading">
            <p class="scene-number" id="sceneNumber"></p>
            <h2 id="sceneTitle"></h2>
          </div>

          <div class="image-frame">
            <img id="sceneImage" alt="">
            <div class="image-placeholder" id="imagePlaceholder" hidden>
              <strong>Bild wird vorbereitet</strong>
              <span id="imagePath"></span>
            </div>
          </div>
        </section>

        <section class="scene-panel" aria-label="Text und Entscheidungen">
          <p class="ending-badge" id="endingBadge" hidden></p>

          <section class="story-text" aria-label="Haupttext">
            <span class="section-icon section-icon-text" aria-hidden="true">🔊</span>
            <p id="sceneText"></p>
          </section>

          <section class="info-box" id="infoBox" aria-label="Infobox" hidden>
            <h3><span class="section-icon section-icon-info" aria-hidden="true">💡</span>Wusstest du?</h3>
            <p id="infoText"></p>
          </section>

          <section class="reader-panel" aria-label="Vorlesen">
            <button class="reader-button" id="readButton" type="button">🔊 Text vorlesen</button>
            <button class="info-reader-button" id="infoReadButton" type="button">💡 Info vorlesen</button>
            <button class="questions-reader-button" id="questionsReadButton" type="button">❓ Fragen vorlesen</button>
            <button class="stop-button" id="stopButton" type="button">⏹ Stoppen</button>
            <p class="reader-message" id="readerMessage" hidden></p>
          </section>

          <section class="choices-area" aria-labelledby="choicesTitle">
            <h2 id="choicesTitle"><span class="section-icon section-icon-questions" aria-hidden="true">❓</span>Was entscheidet ihr?</h2>
            <div class="choices" id="choices"></div>
          </section>
        </section>
      </main>
    </div>
  </body>
</html>
